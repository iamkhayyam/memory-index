<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ramification Index — Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0b0c10;
      --panel:  #141620;
      --border: #20232d;
      --text:   #c9d3e8;
      --muted:  #8a8f9b;
      --ram:    #ffb347;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    nav {
      flex-shrink: 0;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 1.2rem;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .back {
      color: var(--ram);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3em;
      opacity: 0.9;
      transition: opacity 0.15s;
    }
    .back:hover { opacity: 1; }
    .sep {
      color: var(--border);
      font-size: 1.1rem;
      font-weight: 200;
      line-height: 1;
    }
    .paper-title {
      font-size: 0.82rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .edition {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ram);
      border: 1px solid rgba(255,179,71,0.4);
      padding: 0.22em 0.8em;
      border-radius: 99px;
    }
    embed {
      flex: 1;
      width: 100%;
      background: var(--bg);
    }
    /* Fallback for mobile / no PDF plugin */
    .fallback {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }
    .fallback a {
      color: var(--ram);
      text-decoration: none;
      border: 1px solid rgba(255,179,71,0.5);
      padding: 0.55em 1.4em;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <nav>
    <a class="back" href="index.html">← Back</a>
    <span class="sep">/</span>
    <span class="paper-title">The Ramification Index</span>
    <span class="edition" id="edition-label"></span>
  </nav>
  <embed id="viewer" type="application/pdf" />
  <div class="fallback" id="fallback">
    <p>Your browser couldn't display the PDF inline.</p>
    <a id="fallback-link" href="#">↓ Download PDF</a>
  </div>
  <script>
    const params  = new URLSearchParams(location.search);
    const edition = params.get('edition') || 'arxiv';
    const papers  = {
      arxiv:  { file: 'ramification-arxiv.pdf',  label: 'arXiv Edition' },
      nature: { file: 'ramification-nature.pdf', label: 'Journal Edition' }
    };
    const p = papers[edition] || papers.arxiv;
    const viewer = document.getElementById('viewer');
    viewer.src = p.file;
    document.getElementById('edition-label').textContent = p.label;
    document.getElementById('fallback-link').href = p.file;
    document.title = `${p.label} — The Ramification Index`;
    viewer.onerror = () => {
      viewer.style.display = 'none';
      document.getElementById('fallback').style.display = 'flex';
    };
  </script>
</body>
</html>
